<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IPFS Storyboard</title>
  <meta name="description" content="Visual publishing on content-addressed storage with trackable distribution.">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Decentralized media</p>
      <h1>IPFS Storyboard</h1>
      <p class="lead">Publish scenes to IPFS, verify content integrity, and follow audience reach.</p>
    </header>
    <section class="kpi-grid" aria-label="Key metrics">
      <article class="card">
        <h2>Stories published</h2>
        <p class="value">1,406</p>
      </article>
      <article class="card">
        <h2>CIDs pinned</h2>
        <p class="value">5,882</p>
      </article>
      <article class="card">
        <h2>Gateway uptime</h2>
        <p class="value">99.94%</p>
      </article>
      <article class="card">
        <h2>Global views</h2>
        <p class="value">327K</p>
      </article>
    </section>
  </main>
  <script src="assets/shell.js"></script>
</body>
</html>
